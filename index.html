<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ختمة العائلة</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        :root { --bg: #2c3e50; --gold: #f1c40f; --green: #27ae60; --red: #c0392b; --orange: #d35400; --card: #34495e; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: white; margin: 0; padding: 0; }

        /* Interface Connexion / Dashboard */
        .screen { display: none; padding: 15px; min-height: 100vh; flex-direction: column; align-items: center; box-sizing: border-box; }
        .active { display: flex !important; }
        .card-ui { background: rgba(0,0,0,0.2); padding: 20px; border-radius: 15px; border: 1px solid var(--gold); width: 100%; max-width: 400px; margin-top: 50px; }
        
        select, input, button { padding: 15px; border-radius: 10px; border: none; width: 100%; margin: 8px 0; font-size: 16px; box-sizing: border-box; }
        .btn-gold { background: var(--gold); color: #2c3e50; font-weight: bold; }

        /* Header Fixe Mobile */
        .mobile-header {
            position: fixed; top: 0; left: 0; right: 0;
            background: #1a252f; z-index: 1000;
            padding: 10px 15px; border-bottom: 2px solid var(--gold);
            display: flex; flex-direction: column; gap: 5px;
        }
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        .prog-text { font-size: 0.85em; font-weight: bold; color: var(--green); }
        
        .monitor { width: 100%; height: 8px; background: var(--red); display: flex; border-radius: 4px; overflow: hidden; margin-top: 5px; }
        .m-cell { flex: 1; height: 100%; }
        .m-cell.active { background: var(--green); }
        .m-cell.reserved { background: var(--orange); }

        /* Grille Mobile */
        .grid-mobile { width: 100%; padding-top: 130px; padding-bottom: 20px; display: flex; flex-direction: column; gap: 12px; }
        .hizb-card { background: var(--card); border-radius: 10px; padding: 10px; border: 1px solid #455a64; }
        .hizb-card strong { display: block; text-align: center; margin-bottom: 10px; color: var(--gold); font-size: 0.9em; }
        
        .row-thumn { display: flex; gap: 3px; background: var(--red); padding: 2px; border-radius: 5px; }
        .cell { 
            flex: 1; height: 50px; background: rgba(0,0,0,0.3); 
            display: flex; align-items: center; justify-content: center; 
            font-size: 10px; border-radius: 3px; cursor: pointer;
        }
        .cell.active { background: var(--green) !important; font-weight: bold; }
        .cell.reserved { background: var(--orange) !important; font-weight: bold; }

        /* Boutons d'action flottants */
        .back-btn { background: #7f8c8d; color: white; padding: 5px 15px; border-radius: 5px; font-size: 0.8em; font-weight: bold; width: auto; margin: 0; }
        .reserve-toggle { background: var(--orange); color: white; padding: 10px; border-radius: 50px; position: fixed; bottom: 20px; left: 20px; width: 60px; height: 60px; z-index: 1100; box-shadow: 0 4px 10px rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; font-size: 0.7em; font-weight: bold; text-align: center; line-height: 1; }
    </style>
</head>
<body>

<div id="screen-login" class="screen active" style="justify-content: center;">
    <div class="card-ui">
        <h2 style="text-align:center; color:var(--gold);">دخول العائلة</h2>
        <select id="user-select">
            <option value="">-- اختر اسمك --</option>
            <option>أمين</option><option>زهور</option><option>مهدي</option>
            <option>Rosalie</option><option>الياس</option><option>منال</option>
            <option>خليل</option><option>نور</option><option>يوسف</option><option>شهد</option>
        </select>
        <input type="password" id="user-pass" placeholder="كلمة المرور">
        <button class="btn-gold" onclick="login()">دخول</button>
    </div>
</div>

<div id="screen-dashboard" class="screen">
    <div class="card-ui" style="margin-top: 20px;">
        <button class="btn-gold" onclick="showModal()">+ إضافة ختمة جديدة</button>
        <div id="khatmas-container" style="margin-top: 15px;"></div>
    </div>
</div>

<div id="screen-app" class="screen">
    <div class="mobile-header">
        <div class="header-top">
            <button class="back-btn" onclick="exit()">عودة</button>
            <div id="k-title-display" style="color:var(--gold); font-weight:bold; font-size:0.9em;"></div>
            <div id="res-percent" class="prog-text">0%</div>
        </div>
        <div id="mon" class="monitor"></div>
    </div>

    <div id="g" class="grid-mobile"></div>
    
    <div id="btn-reserve" class="reserve-toggle" onclick="toggleReserve()">وضع<br>الحجز</div>
</div>

<div id="modal-new" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:2000; align-items:center; justify-content:center;">
    <div class="card-ui" style="background:var(--card);">
        <h3 style="margin-top:0;">ختمة جديدة</h3>
        <input type="text" id="k-title" placeholder="عنوان الختمة">
        <button class="btn-gold" onclick="create()">تأكيد</button>
        <button style="background:transparent; color:#bbb;" onclick="closeModal()">إلغاء</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD3wfpWiJprAJyajMbz9cxzPtiaTJwq2xE",
        authDomain: "khatma-8a394.firebaseapp.com",
        databaseURL: "https://khatma-8a394-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "khatma-8a394",
        appId: "1:99722444250:web:82ac364641022f6e3194e3"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentUser = localStorage.getItem('khatma_user') || "";
    let currentKId = "";
    let isReserve = false;
    const labels = ["ث", "ر", "ث", "ن", "ث", "ر", "ث", "ح"];

    if(currentUser) initDash();

    function login() {
        const u = document.getElementById('user-select').value;
        if(u && document.getElementById('user-pass').value === "della2026") {
            currentUser = u; localStorage.setItem('khatma_user', u); initDash();
        } else alert("خطأ");
    }

    function initDash() {
        showScreen('screen-dashboard');
        db.ref('khatmas_multi').on('value', snap => {
            const cont = document.getElementById('khatmas-container');
            cont.innerHTML = "";
            const data = snap.val();
            if(!data) return;
            Object.keys(data).reverse().forEach(id => {
                const k = data[id];
                const d = document.createElement('div');
                d.className = 'card-ui'; d.style.marginTop = "10px";
                d.innerHTML = `<strong>${k.info.title}</strong><br><small>بواسطة: ${k.info.createdBy}</small>`;
                d.onclick = () => openK(id, k);
                cont.appendChild(d);
            });
        });
    }

    function openK(id, data) {
        currentKId = id;
        document.getElementById('k-title-display').innerText = data.info.title;
        db.ref('khatmas_multi/'+id+'/cells').on('value', snap => render(snap.val() || {}));
        showScreen('screen-app');
    }

    function render(cells) {
        const g = document.getElementById('g'); const mon = document.getElementById('mon');
        g.innerHTML = ""; mon.innerHTML = "";
        let count = 0;

        for(let i=0; i<480; i++) {
            const val = cells[i]; let st = "";
            if(val?.startsWith("R_")) st="reserved";
            else if(val) { st="active"; count++; }
            const d = document.createElement('div'); d.className = 'm-cell '+st; mon.appendChild(d);
        }

        document.getElementById('res-percent').innerText = Math.round((count/480)*100) + "%";

        for(let i=1; i<=60; i++) {
            const card = document.createElement('div'); card.className = 'hizb-card';
            card.innerHTML = `<strong>الحزب ${i}</strong>`;
            const row = document.createElement('div'); row.className = 'row-thumn';
            for(let j=0; j<8; j++) {
                const idx = (i-1)*8+j; const val = cells[idx];
                const c = document.createElement('div'); c.className = 'cell';
                let txt = labels[j];
                if(val?.startsWith("R_")) { c.classList.add('reserved'); txt = val.replace("R_","").substring(0,2); }
                else if(val) { c.classList.add('active'); txt = val.substring(0,2); }
                c.innerText = txt;
                c.onclick = () => {
                    const ref = db.ref('khatmas_multi/'+currentKId+'/cells/'+idx);
                    if(isReserve) { val==="R_"+currentUser ? ref.remove() : ref.set("R_"+currentUser); }
                    else { (val && !val.startsWith("R_")) ? (val===currentUser && ref.remove()) : ref.set(currentUser); }
                };
                row.appendChild(c);
            }
            card.appendChild(row); g.appendChild(card);
        }
    }

    function toggleReserve() {
        isReserve = !isReserve;
        const btn = document.getElementById('btn-reserve');
        btn.style.background = isReserve ? "var(--green)" : "var(--orange)";
        btn.innerHTML = isReserve ? "وضع<br>القراءة" : "وضع<br>الحجز";
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        window.scrollTo(0,0);
    }
    function exit() { showScreen('screen-dashboard'); }
    function showModal() { document.getElementById('modal-new').style.display='flex'; }
    function closeModal() { document.getElementById('modal-new').style.display='none'; }
    function create() {
        const t = document.getElementById('k-title').value;
        if(t) db.ref('khatmas_multi').push().set({info:{title:t, createdBy:currentUser, timestamp:Date.now()}, cells:{}}).then(closeModal);
    }
</script>
</body>
</html>
